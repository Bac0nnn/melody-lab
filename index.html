<!DOCTYPE html>

<!-- 🤖 AI 生成：零依赖完整独立版 Melody Lab，可在浏览器中直接打开使用 -->
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow-x:hidden;background:#0a0a1a;color:#eee;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;-webkit-font-smoothing:antialiased}
h1{font-size:22px;font-weight:700;margin-bottom:4px}
h2{font-size:16px;font-weight:600;margin-bottom:8px}
.container{max-width:1000px;margin:0 auto;padding:16px}

/* 导航 */
.nav{display:flex;justify-content:center;gap:4px;margin-bottom:16px}
.nav-btn{padding:8px 18px;border-radius:12px;border:1px solid rgba(255,255,255,0.06);background:rgba(255,255,255,0.03);color:rgba(255,255,255,0.4);font-size:14px;cursor:pointer;transition:all 0.2s}
.nav-btn:hover{color:rgba(255,255,255,0.7);background:rgba(255,255,255,0.06)}
.nav-btn.active{background:rgba(255,255,255,0.12);color:#fff;border-color:rgba(255,255,255,0.15);transform:scale(1.03)}

/* 钢琴键盘 */
.piano-wrap{position:relative;user-select:none;max-width:700px;margin:0 auto}
.white-keys{display:flex;justify-content:center;gap:1px}
.white-key{flex:1;height:130px;background:linear-gradient(180deg,#f8f8f8,#e8e8e8);border-radius:0 0 6px 6px;border:1px solid #ccc;display:flex;align-items:flex-end;justify-content:center;padding-bottom:10px;font-size:11px;font-family:monospace;color:#999;cursor:pointer;transition:all 0.08s;min-width:36px}
.white-key:active{transform:scaleY(0.97);background:linear-gradient(180deg,#e8e8e8,#ddd)}
.white-key.highlight{background:linear-gradient(180deg,#dbeafe,#93c5fd)!important;border-color:#60a5fa;color:#1e40af;box-shadow:inset 0 -2px 8px rgba(96,165,250,0.3)}
.black-keys{position:relative;height:0;display:flex;justify-content:center;margin-bottom:-10px;z-index:10}
.black-key{position:absolute;bottom:0;width:26px;height:90px;background:linear-gradient(180deg,#444,#222);border-radius:0 0 4px 4px;border:1px solid #111;cursor:pointer;transition:all 0.08s;box-shadow:0 3px 8px rgba(0,0,0,0.4)}
.black-key:active{transform:scaleY(0.93);background:linear-gradient(180deg,#333,#111)}
.black-key.highlight{background:linear-gradient(180deg,#60a5fa,#3b82f6)!important;border-color:#2563eb;box-shadow:0 3px 12px rgba(59,130,246,0.5)}

/* 卡片通用 */
.card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:16px;margin-bottom:12px}
.card-title{font-size:11px;color:rgba(255,255,255,0.3);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.btn-xs{padding:4px 10px;border-radius:8px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.5);font-size:12px;cursor:pointer;transition:all 0.2s}
.btn-xs:hover{background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.8)}
.btn-xs.active{background:rgba(59,130,246,0.15);border-color:rgba(59,130,246,0.4);color:#93c5fd}

/* 可视化 */
canvas.visualizer{width:100%;height:320px;border-radius:10px;background:#0a0a1a}
select{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:6px 12px;color:rgba(255,255,255,0.7);font-size:13px;outline:none}
select option{background:#1a1a2e}
input[type=range]{accent-color:#8b5cf6;width:140px}
.page{display:none}
.page.active{display:block;animation:fadeIn 0.3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.note-display{font-size:28px;font-weight:700;font-family:monospace;color:#fff}
.tab-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:640px){.tab-grid{grid-template-columns:1fr}}
/* scrollbar */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px}
/* 可滚动钢琴 */
.piano-scroll{overflow-x:auto;overflow-y:hidden;max-width:100%;padding-bottom:4px}
.piano-scroll::-webkit-scrollbar{height:3px}
.piano-scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);border-radius:2px}
/* 录制按钮 */
.rec-btn{padding:6px 16px;border-radius:8px;border:1px solid rgba(255,255,255,0.1);font-size:13px;cursor:pointer;transition:all 0.2s;display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,0.03);color:rgba(255,255,255,0.5)}
.rec-btn:hover{background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.7)}
.rec-btn.recording{background:rgba(239,68,68,0.2)!important;border-color:#ef4444!important;color:#fca5a5!important;animation:recPulse 1s infinite}
.rec-btn.playing{background:rgba(34,197,94,0.2)!important;border-color:#22c55e!important;color:#86efac!important}
@keyframes recPulse{0%,100%{opacity:1}50%{opacity:0.5}}
/* 键盘提示 */
.kbd-hint{display:inline-flex;align-items:center;gap:3px;font-size:10px;color:rgba(255,255,255,0.15);margin-top:8px;flex-wrap:wrap;justify-content:center}
.kbd-hint kbd{display:inline-block;padding:1px 5px;border-radius:3px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);font-family:monospace;font-size:9px;color:rgba(255,255,255,0.2);line-height:1.4}
.kbd-hint kbd.active{background:rgba(96,165,250,0.25);border-color:rgba(96,165,250,0.4);color:#93c5fd}
</style>

<body>

<div class="container">
  <div style="text-align:center;margin:12px 0">
    <div class="nav" id="navBtns"></div>
    <h1>Melody Lab</h1>
    <p style="font-size:13px;color:rgba(255,255,255,0.3);margin-bottom:8px">交互式音乐理论与创作工具</p>
  </div>

  <!-- ========== PAGE 1: PIANO ========== -->
  <div class="page active" id="pagePiano">
    <div style="display:flex;justify-content:center;gap:12px;flex-wrap:wrap;margin-bottom:12px">
      <div class="card" style="min-width:100px;text-align:center">
        <div class="card-title">Last Note</div>
        <div class="note-display" id="lastNote">--</div>
        <div style="font-size:11px;color:rgba(255,255,255,0.2)" id="lastMidi">MIDI: --</div>
      </div>
      <div class="card">
        <div class="card-title">🎵 Quick Chord</div>
        <div style="display:flex;gap:4px;flex-wrap:wrap" id="quickChords"></div>
      </div>
      <div class="card">
        <div class="card-title">🎼 Quick Scale</div>
        <div style="display:flex;gap:4px;flex-wrap:wrap" id="quickScales"></div>
      </div>
    </div>
    <div style="display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin-bottom:12px">
      <button class="rec-btn" id="recBtn">⏺ 录制</button>
      <button class="rec-btn" id="playRecBtn" style="display:none">▶ 回放</button>
      <button class="rec-btn" id="clearRecBtn" style="display:none">🗑 清除</button>
      <span id="recStatus" style="font-size:11px;color:rgba(255,255,255,0.2);line-height:32px">未录制</span>
    </div>
    <div class="piano-scroll">
    <div class="piano-wrap" id="pianoContainer"></div>
    </div>
    <div class="kbd-hint" id="kbdHint"></div>
  </div>

  <!-- ========== PAGE 2: EXPLORE ========== -->
  <div class="page" id="pageExplore">
    <div style="display:flex;justify-content:center;gap:8px;margin-bottom:12px">
      <button class="nav-btn active" id="tabChord">🎵 和弦</button>
      <button class="nav-btn" id="tabScale">🎼 音阶</button>
    </div>
    <div style="display:flex;align-items:flex-start;gap:16px;flex-wrap:wrap">
      <div style="flex:1;min-width:200px">
        <div class="card" id="exploreList"></div>
      </div>
      <div style="flex:2;min-width:280px">
        <div class="card" id="exploreDetail"></div>
        <div class="piano-wrap" id="explorePiano" style="margin-top:8px"></div>
      </div>
    </div>
  </div>

  <!-- ========== PAGE 3: VISUALIZER ========== -->
  <div class="page" id="pageVisualizer">
    <div style="display:flex;justify-content:center;gap:8px;margin-bottom:8px" id="vizModes"></div>
    <canvas class="visualizer" id="vizCanvas"></canvas>
    <div style="display:flex;flex-wrap:wrap;justify-content:center;gap:12px;margin-top:12px">
      <div class="card" style="width:100%">
        <div class="card-title">🎧 音频源</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
          <button class="nav-btn" id="captureAudioBtn">🎤 捕获系统音频</button>
          <label class="nav-btn" style="cursor:pointer;display:inline-flex;align-items:center;gap:4px" for="audioFileInput">📁 选择音频文件</label>
          <input type="file" id="audioFileInput" accept="audio/*" style="display:none">
          <button class="nav-btn" id="stopAudioBtn" style="display:none;color:#fca5a5">⏹ 停止</button>
          <span id="audioStatus" style="font-size:12px;color:rgba(255,255,255,0.3)">当前: 合成信号</span>
        </div>
      </div>
      <div class="card" style="display:flex;align-items:center;gap:8px">
        <span style="font-size:12px;color:rgba(255,255,255,0.4)">频率</span>
        <input type="range" id="freqSlider" min="65" max="1047" value="440">
        <span style="font-size:13px;font-family:monospace;color:rgba(255,255,255,0.5);min-width:60px" id="freqDisplay">440 Hz</span>
      </div>
      <button class="nav-btn" id="testToneBtn">▶ 测试音</button>
      <div class="card">
        <div class="card-title">快速试音</div>
        <div style="display:flex;gap:3px;flex-wrap:wrap" id="quickNotes"></div>
      </div>
    </div>
  </div>
</div>

<script>
// ===== MUSIC THEORY LIBRARY =====
const NOTE_NAMES = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
const freqCache = new Map();
function m2f(m) { if(freqCache.has(m))return freqCache.get(m); const f=440*Math.pow(2,(m-69)/12); freqCache.set(m,f); return f; }
function m2n(m) { return NOTE_NAMES[m%12]+(Math.floor(m/12)-1); }
function genNotes(s,e) { const r=[]; for(let m=s;m<=e;m++) r.push({name:m2n(m),midi:m,freq:m2f(m)}); return r; }
const CHORDS = [
  {name:"大三和弦",sym:"Maj",iv:[0,4,7],desc:"明亮、稳定、愉悦"},
  {name:"小三和弦",sym:"min",iv:[0,3,7],desc:"柔和、忧伤、温暖"},
  {name:"属七和弦",sym:"7",iv:[0,4,7,10],desc:"紧张、需要解决"},
  {name:"大七和弦",sym:"Maj7",iv:[0,4,7,11],desc:"梦幻、爵士感"},
  {name:"小七和弦",sym:"min7",iv:[0,3,7,10],desc:"柔和爵士"},
  {name:"减三和弦",sym:"dim",iv:[0,3,6],desc:"紧张、不安"},
  {name:"挂留四",sym:"sus4",iv:[0,5,7],desc:"空灵、未解决"},
];
const SCALES = [
  {name:"大调音阶",iv:[0,2,4,5,7,9,11],desc:"明亮常用音阶"},
  {name:"自然小调",iv:[0,2,3,5,7,8,10],desc:"忧伤常用音阶"},
  {name:"五声大调",iv:[0,2,4,7,9],desc:"中国传统音乐"},
  {name:"五声小调",iv:[0,3,5,7,10],desc:"蓝调民谣"},
  {name:"布鲁斯音阶",iv:[0,3,5,6,7,10],desc:"爵士蓝调核心"},
  {name:"全音音阶",iv:[0,2,4,6,8,10],desc:"德彪西印象派"},
];

// ===== AUDIO ENGINE =====
let audioCtx = null;
function getCtx() {
  if(!audioCtx) audioCtx = new AudioContext();
  if(audioCtx.state==="suspended") audioCtx.resume();
  return audioCtx;
}
function playNote(freq, dur) {
  const ctx = getCtx(), osc = ctx.createOscillator(), gain = ctx.createGain();
  const now = ctx.currentTime;
  osc.type = "sine"; osc.frequency.value = freq;
  gain.gain.setValueAtTime(0,now);
  gain.gain.linearRampToValueAtTime(0.25,now+0.02);
  gain.gain.linearRampToValueAtTime(0.15,now+0.1);
  gain.gain.setValueAtTime(0.15,now+(dur||0.5)-0.05);
  gain.gain.linearRampToValueAtTime(0,now+(dur||0.5));
  osc.connect(gain); gain.connect(ctx.destination);
  osc.start(now); osc.stop(now+(dur||0.5));
}
function playChord(freqs, dur) { freqs.forEach(f => playNote(f, dur||1.2)); }
function playArp(freqs, intv) { freqs.forEach((f,i) => setTimeout(()=>playNote(f,0.3),i*(intv||0.12)*1000)); }

// ===== MIDI NOTE POSITIONS =====
const BLACK_SEMIS = { 1:0.7, 3:1.7, 6:3.7, 8:4.7, 10:5.7 };

function buildPiano(containerId, highlightNotes, onNoteClick, rangeStart, rangeEnd) {
  const wrap = document.getElementById(containerId);
  if(!wrap) return;
  const start = rangeStart||48, end = rangeEnd||71;
  const allNotes = genNotes(start, end);
  const whiteNotes = allNotes.filter(n=>!n.name.includes("#"));
  const blackNotes = allNotes.filter(n=>n.name.includes("#"));
  const firstOctave = Math.floor(start/12)-1;
  let html = '<div class="black-keys" style="height:0">';
  blackNotes.forEach(n => {
    const nn = n.name.replace(/\d/,"");
    const oct = parseInt(n.name.replace(/[^0-9]/g,""));
    const pos = BLACK_SEMIS[nn] || 0;
    const left = ((oct-firstOctave)*7 + pos) * (100/7) - 1.5;
    const hl = highlightNotes && highlightNotes.includes(n.midi) ? ' highlight' : '';
    html += `<div class="black-key${hl}" style="left:${left}%" data-midi="${n.midi}"></div>`;
  });
  html += '</div><div class="white-keys">';
  whiteNotes.forEach(n => {
    const hl = highlightNotes && highlightNotes.includes(n.midi) ? ' highlight' : '';
    html += `<div class="white-key${hl}" data-midi="${n.midi}">${n.name}</div>`;
  });
  html += '</div>';
  wrap.innerHTML = html;
  
  // Events
  wrap.querySelectorAll('[data-midi]').forEach(el => {
    el.addEventListener('mousedown', () => {
      const midi = parseInt(el.dataset.midi);
      const note = allNotes.find(n=>n.midi===midi);
      if(note) triggerNote(midi);
    });
  });
}

// ===== NAVIGATION =====
const pages = ['Piano','Explore','Visualizer'];
const pageIds = ['pagePiano','pageExplore','pageVisualizer'];
const navBtns = document.getElementById('navBtns');
pages.forEach((p,i)=>{
  const btn = document.createElement('button');
  btn.className = 'nav-btn' + (i===0?' active':'');
  const emojis = ['🎹','🔬','📊'];
  btn.textContent = emojis[i] + ' ' + p;
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.page').forEach(pg=>pg.classList.remove('active'));
    document.getElementById(pageIds[i]).classList.add('active');
  });
  navBtns.appendChild(btn);
});

// ===== PAGE 1: PIANO =====
let lastMidiVal = 60;
buildPiano('pianoContainer', [], null, 36, 83);

// Quick chords
(function(){
  const c = document.getElementById('quickChords');
  CHORDS.slice(0,5).forEach((ch,i)=>{
    const btn = document.createElement('button');
    btn.className = 'btn-xs';
    btn.textContent = ch.sym;
    btn.addEventListener('click', ()=>{
      const freqs = ch.iv.map(iv=>m2f(lastMidiVal+iv));
      playChord(freqs,1.2);
      const highlights = ch.iv.map(iv=>lastMidiVal+iv);
      buildPiano('pianoContainer', highlights);
      document.querySelectorAll('#quickChords .btn-xs').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
    });
    c.appendChild(btn);
  });
  const s = document.getElementById('quickScales');
  SCALES.slice(0,5).forEach((sc,i)=>{
    const btn = document.createElement('button');
    btn.className = 'btn-xs';
    btn.textContent = sc.name.substring(0,4);
    btn.addEventListener('click', ()=>{
      const freqs = sc.iv.map(iv=>m2f(lastMidiVal+iv));
      playArp(freqs,0.12);
      const highlights = sc.iv.map(iv=>lastMidiVal+iv);
      buildPiano('pianoContainer', highlights);
      document.querySelectorAll('#quickScales .btn-xs').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
    });
    s.appendChild(btn);
  });
})();

// ===== 键盘映射 =====
const KEY_MAP = {
  'z':48,'s':49,'x':50,'d':51,'c':52,
  'v':53,'g':54,'b':55,'h':56,'n':57,'j':58,'m':59,
  'q':60,'2':61,'w':62,'3':63,'e':64,
  'r':65,'5':66,'t':67,'6':68,'y':69,'7':70,'u':71,
  'i':72,'9':73,'o':74,'0':75,'p':76
};
const KEY_HINT = [
  ['c2','z','s','x','d','c','v','g','b','h','n','j','m'],
  ['c3','q','2','w','3','e','r','5','t','6','y','7','u'],
  ['c4','i','9','o','0','p']
];
let keyboardOctave = 0;
let activeKeys = new Map();
let pressedKeys = new Set();

function triggerNote(midi) {
  const note = allNotesCache.find(n=>n.midi===midi);
  if(!note) return;
  lastMidiVal = midi;
  playNote(note.freq, 0.5);
  document.getElementById('lastNote').textContent = m2n(midi);
  document.getElementById('lastMidi').textContent = 'MIDI: ' + midi;
  // Record if active
  if(isRecording) {
    const now = Date.now();
    recordedNotes.push({midi, time: now - recStartTime, dur:0.5});
  }
  // Flash key
  const key = document.querySelector(`#pianoContainer [data-midi="${midi}"]`);
  if(key) { key.classList.add('highlight'); setTimeout(()=>key.classList.remove('highlight'),150); }
}
const allNotesCache = genNotes(36,83);

// 键盘事件
document.addEventListener('keydown', (e)=>{
  if(e.repeat || e.ctrlKey || e.altKey || e.metaKey) return;
  const key = e.key.toLowerCase();
  if(key==='arrowleft'){keyboardOctave=Math.max(-2,keyboardOctave-1);updateKbdHint();return}
  if(key==='arrowright'){keyboardOctave=Math.min(2,keyboardOctave+1);updateKbdHint();return}
  const midi = KEY_MAP[key];
  if(midi!==undefined && !pressedKeys.has(key)) {
    pressedKeys.add(key);
    const note = allNotesCache.find(n=>n.midi===midi+keyboardOctave*12);
    if(note) triggerNote(note.midi);
  }
});
document.addEventListener('keyup', (e)=>{
  const key = e.key.toLowerCase();
  pressedKeys.delete(key);
});

// ===== 键盘提示 =====
function updateKbdHint() {
  const el = document.getElementById('kbdHint');
  if(!el) return;
  const oct = 3 + keyboardOctave;
  const noteNames = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
  let html = '<span style="margin-right:6px">⌨:</span>';
  let prevWhite = null;
  KEY_HINT.forEach((row,ri)=>{
    html += '<span style="margin:0 4px">';
    row.forEach((key,ki)=>{
      if(ki===0) return; // skip note name
      const idx = KEY_MAP[key];
      if(idx===undefined) return;
      const absMidi = idx + keyboardOctave*12;
      const nn = noteNames[absMidi%12];
      const isBlack = nn.includes('#');
      if(isBlack) {
        html += `<kbd style="background:rgba(255,255,255,0.08)">${key.toUpperCase()}</kbd>`;
      } else {
        html += `<kbd>${key.toUpperCase()}</kbd>`;
      }
    });
    html += '</span>';
  });
  html += `<span style="margin-left:8px;color:rgba(255,255,255,0.2)">← → 移调</span>`;
  el.innerHTML = html;
}
updateKbdHint();

// ===== 录制/回放 =====
let isRecording = false;
let recordedNotes = [];
let recStartTime = 0;
let recPlaybackTimers = [];

function startRecording() {
  recordedNotes = [];
  isRecording = true;
  recStartTime = Date.now();
  recPlaybackTimers.forEach(t=>clearTimeout(t));
  recPlaybackTimers = [];
  const btn = document.getElementById('recBtn');
  btn.textContent = '⏹ 停止录制';
  btn.classList.add('recording');
  document.getElementById('recStatus').textContent = '录制中...';
  document.getElementById('recStatus').style.color = '#fca5a5';
  document.getElementById('playRecBtn').style.display = 'none';
  document.getElementById('clearRecBtn').style.display = 'none';
}

function stopRecording() {
  isRecording = false;
  const btn = document.getElementById('recBtn');
  btn.textContent = recordedNotes.length > 0 ? '⏺ 已录制' : '⏺ 录制';
  btn.classList.remove('recording');
  if(recordedNotes.length > 0) {
    document.getElementById('playRecBtn').style.display = '';
    document.getElementById('clearRecBtn').style.display = '';
    document.getElementById('recStatus').textContent = recordedNotes.length + ' 个音符';
    document.getElementById('recStatus').style.color = 'rgba(255,255,255,0.3)';
  } else {
    document.getElementById('recStatus').textContent = '未录制';
    document.getElementById('recStatus').style.color = 'rgba(255,255,255,0.2)';
  }
}

function playRecording() {
  if(recordedNotes.length===0) return;
  const btn = document.getElementById('playRecBtn');
  btn.classList.add('playing');
  btn.textContent = '▶ 播放中...';
  const firstTime = recordedNotes[0].time;
  recPlaybackTimers = recordedNotes.map(n=>setTimeout(()=>{
    const note = allNotesCache.find(x=>x.midi===n.midi);
    if(note) {
      playNote(note.freq, n.dur||0.5);
      const key = document.querySelector(`#pianoContainer [data-midi="${n.midi}"]`);
      if(key) { key.classList.add('highlight'); setTimeout(()=>key.classList.remove('highlight'),n.dur*900||200); }
    }
  }, n.time - firstTime));
  // Schedule reset
  const totalTime = recordedNotes[recordedNotes.length-1].time - firstTime + 1000;
  setTimeout(()=>{
    btn.classList.remove('playing');
    btn.textContent = '▶ 回放';
  }, totalTime);
}

function clearRecording() {
  recordedNotes = [];
  recPlaybackTimers.forEach(t=>clearTimeout(t));
  recPlaybackTimers = [];
  document.getElementById('recBtn').textContent = '⏺ 录制';
  document.getElementById('playRecBtn').style.display = 'none';

// ===== PAGE 3: VISUALIZER =====
const vizCanvas = document.getElementById('vizCanvas');
const ctx = vizCanvas.getContext('2d');
let vizMode = 'spectrum';
let vizAnim;
let audioAnalyser = null;
let audioSourceType = 'synthetic'; // 'synthetic' | 'system' | 'file'
let audioSourceStream = null;
let audioElement = null;
let audioFreqArray = null;
let audioWaveArray = null;
let isCapturing = false;

function resizeCanvas() {
  const dpr = window.devicePixelRatio||1;
  const rect = vizCanvas.getBoundingClientRect();
  vizCanvas.width = rect.width * dpr;
  vizCanvas.height = rect.height * dpr;
  ctx.scale(dpr, dpr);
  return rect;
}

// Viz modes buttons
['spectrum','waveform','circular'].forEach((m,i)=>{
  const labels = ['📊 频谱','〰️ 波形','🌀 圆形'];
  const btn = document.createElement('button');
  btn.className = 'nav-btn' + (i===0?' active':'');
  btn.textContent = labels[i];
  btn.addEventListener('click',()=>{
    document.querySelectorAll('#vizModes .nav-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    vizMode = m;
  });
  document.getElementById('vizModes').appendChild(btn);
});

let vizTime = 0;
function drawViz() {
  const rect = resizeCanvas();
  const w = rect.width, h = rect.height;
  const useRealAudio = audioAnalyser && audioSourceType !== 'synthetic';
  if(!useRealAudio) vizTime += 0.02;

  // Background
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(0,0,w,h);

  const barCount = vizMode==='circular'?64:vizMode==='spectrum'?32:128;
  let bars;
  if(useRealAudio && audioFreqArray) {
    audioAnalyser.getByteFrequencyData(audioFreqArray);
    audioAnalyser.getByteTimeDomainData(audioWaveArray);
    bars = Array.from({length:barCount},(_,i)=>{
      const idx = Math.floor((i/barCount)*audioFreqArray.length);
      if(vizMode==='waveform') {
        const val = (audioWaveArray[idx]-128)/128;
        return val*0.8+0.5;
      }
      return audioFreqArray[idx]/255;
    });
  } else {
    bars = Array.from({length:barCount},(_,i)=>{
      const freq = 50+i*(2000/barCount);
      return (Math.sin(vizTime*freq*0.001)*0.5+0.5)*0.8 + (Math.sin(vizTime*freq*0.003+(i/barCount)*Math.PI*2)*0.3+0.3)*0.2;
    });
  }

  if(vizMode==='spectrum') {
    const barW = w/barCount;
    bars.forEach((amp,i)=>{
      const barH = amp * h * 0.7;
      const hue = (i/barCount)*240+200;
      ctx.fillStyle = `hsla(${hue},80%,60%,0.8)`;
      ctx.shadowColor = `hsla(${hue},80%,60%,0.3)`;
      ctx.shadowBlur = 8;
      ctx.fillRect(i*barW, h-barH, barW-1, barH);
    });
    ctx.shadowBlur = 0;
  } else if(vizMode==='waveform') {
    ctx.beginPath();
    ctx.strokeStyle = '#6C63FF';
    ctx.lineWidth = 2;
    ctx.shadowColor = '#6C63FF';
    ctx.shadowBlur = 10;
    bars.forEach((amp,i)=>{
      const x = (i/barCount)*w;
      const y = useRealAudio ? h/2 + (amp-0.5)*h*0.8 : h/2 + amp*h*0.4*Math.sin(i*0.1+vizTime*2);
      i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
    });
    ctx.stroke();
    ctx.shadowBlur = 0;
  } else {
    const cx = w/2, cy = h/2, radius = Math.min(w,h)*0.3;
    bars.forEach((amp,i)=>{
      const angle = (i/barCount)*Math.PI*2 - Math.PI/2;
      const r = radius + amp*radius*0.5;
      const x = cx + Math.cos(angle)*r;
      const y = cy + Math.sin(angle)*r;
      const hue = (i/barCount)*360;
      ctx.fillStyle = `hsla(${hue},80%,60%,0.6)`;
      ctx.shadowColor = `hsla(${hue},80%,60%,0.3)`;
      ctx.shadowBlur = 6;
      ctx.beginPath();
      ctx.arc(x,y,3+amp*4,0,Math.PI*2);
      ctx.fill();
    });
    ctx.shadowBlur = 0;
  }
  vizAnim = requestAnimationFrame(drawViz);
}
drawViz();

// ===== 音频捕获（系统音频 + 文件播放）=====
async function captureSystemAudio() {
  try {
    const stream = await navigator.mediaDevices.getDisplayMedia({
      audio: true,
      video: { width: 1, height: 1 }
    });
    stream.getVideoTracks().forEach(t => t.stop());
    setupAudioCapture(stream, 'system');
  } catch(e) {
    updateAudioStatus('捕获失败: ' + e.message, true);
  }
}

function startFilePlayback(file) {
  stopAudioSource();
  const url = URL.createObjectURL(file);
  const audio = new Audio(url);
  audio.loop = true;
  audio.crossOrigin = 'anonymous';
  audio.play().then(() => {
    const stream = (audio.captureStream || audio.mozCaptureStream).call(audio);
    setupAudioCapture(stream, 'file');
    audioElement = audio;
  }).catch(e => {
    updateAudioStatus('播放失败: ' + e.message, true);
  });
}

function setupAudioCapture(stream, type) {
  stopAudioSource();
  audioSourceStream = stream;
  audioSourceType = type;
  const ctx = getCtx();
  const source = ctx.createMediaStreamSource(stream);
  const analyser = ctx.createAnalyser();
  analyser.fftSize = 256;
  audioAnalyser = analyser;
  audioFreqArray = new Uint8Array(analyser.frequencyBinCount);
  audioWaveArray = new Uint8Array(analyser.frequencyBinCount);
  source.connect(analyser);
  isCapturing = true;
  document.getElementById('captureAudioBtn').style.display = 'none';
  document.querySelector('label[for="audioFileInput"]').style.display = 'none';
  document.getElementById('stopAudioBtn').style.display = '';
  updateAudioStatus(type === 'system' ? '已捕获系统音频 ✓' : '正在播放音频文件 ✓', false);
}

function stopAudioSource() {
  if(audioSourceStream) {
    audioSourceStream.getTracks().forEach(t => t.stop());
    audioSourceStream = null;
  }
  if(audioElement) {
    audioElement.pause();
    audioElement = null;
  }
  audioAnalyser = null;
  audioFreqArray = null;
  audioWaveArray = null;
  audioSourceType = 'synthetic';
  isCapturing = false;
  document.getElementById('captureAudioBtn').style.display = '';
  const fileLabel = document.querySelector('label[for="audioFileInput"]');
  if(fileLabel) fileLabel.style.display = '';
  document.getElementById('stopAudioBtn').style.display = 'none';
  updateAudioStatus('合成信号', false);
}

function updateAudioStatus(msg, isError) {
  const el = document.getElementById('audioStatus');
  if(el) {
    el.textContent = '当前: ' + msg;
    el.style.color = isError ? '#fca5a5' : 'rgba(255,255,255,0.3)';
  }
}
